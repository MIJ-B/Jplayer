        video_adapter = '''package com.example.jplayer.ui.adapter

import android.view.LayoutInflater
import android.view.ViewGroup
import androidx.recyclerview.widget.RecyclerView
import com.bumptech.glide.Glide
import com.example.jplayer.databinding.ItemVideoBinding
import com.example.jplayer.model.MediaItem

class VideoAdapter(
    private val videos: List<MediaItem>,
    private val onClick: (MediaItem) -> Unit
) : RecyclerView.Adapter<VideoAdapter.VideoViewHolder>() {
    
    inner class VideoViewHolder(private val binding: ItemVideoBinding) : 
        RecyclerView.ViewHolder(binding.root) {
        
        fun bind(video: MediaItem) {
            binding.textTitle.text = video.title
            binding.textDuration.text = video.getFormattedDuration()
            binding.textSize.text = video.getFormattedSize()
            
            Glide.with(binding.root.context)
                .load(video.uri)
                .centerCrop()
                .into(binding.imageThumbnail)
            
            binding.root.setOnClickListener { onClick(video) }
        }
    }
    
    override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): VideoViewHolder {
        val binding = ItemVideoBinding.inflate(
            LayoutInflater.from(parent.context), parent, false
        )
        return VideoViewHolder(binding)
    }
    
    override fun onBindViewHolder(holder: VideoViewHolder, position: Int) {
        holder.bind(videos[position])
    }
    
    override fun getItemCount() = videos.size
}'''
        
