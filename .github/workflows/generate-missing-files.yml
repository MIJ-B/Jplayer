name: Generate Missing Files

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/generate-missing-files.yml'

jobs:
  generate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Generate missing project files
      run: |
        python3 << 'PYTHON_SCRIPT'
        import os
        
        # Create directories
        dirs = [
            "app/src/main/java/com/example/jplayer/ui/fragments",
            "app/src/main/java/com/example/jplayer/ui/adapter",
            "app/src/main/java/com/example/jplayer/model",
            "app/src/main/res/layout",
            "app/src/main/res/menu",
            "app/src/main/res/drawable"
        ]
        
        for d in dirs:
            os.makedirs(d, exist_ok=True)
            print(f"✅ Created: {d}")
        
        # MediaItem.kt
        media_item = '''package com.example.jplayer.model

import android.os.Parcelable
import kotlinx.parcelize.Parcelize

@Parcelize
data class MediaItem(
    val id: Long,
    val title: String,
    val duration: Long,
    val size: Long,
    val path: String,
    val uri: String,
    val dateAdded: Long,
    val isVideo: Boolean,
    val artist: String? = null,
    val album: String? = null,
    var isFavorite: Boolean = false
) : Parcelable {
    
    fun getFormattedDuration(): String {
        val seconds = (duration / 1000) % 60
        val minutes = (duration / (1000 * 60)) % 60
        val hours = (duration / (1000 * 60 * 60))
        
        return if (hours > 0) {
            String.format("%02d:%02d:%02d", hours, minutes, seconds)
        } else {
            String.format("%02d:%02d", minutes, seconds)
        }
    }
    
    fun getFormattedSize(): String {
        val kb = size / 1024.0
        val mb = kb / 1024.0
        val gb = mb / 1024.0
        
        return when {
            gb >= 1 -> String.format("%.2f GB", gb)
            mb >= 1 -> String.format("%.2f MB", mb)
            else -> String.format("%.2f KB", kb)
        }
    }
}'''
        
        with open("app/src/main/java/com/example/jplayer/model/MediaItem.kt", "w") as f:
            f.write(media_item)
        print("✅ Created: MediaItem.kt")
        
        # Playlist.kt
        playlist = '''package com.example.jplayer.model

import android.os.Parcelable
import kotlinx.parcelize.Parcelize

@Parcelize
data class Playlist(
    val id: Long,
    val name: String,
    val itemCount: Int = 0,
    val dateCreated: Long = System.currentTimeMillis(),
    val items: List<MediaItem> = emptyList()
) : Parcelable'''
        
        with open("app/src/main/java/com/example/jplayer/model/Playlist.kt", "w") as f:
            f.write(playlist)
        print("✅ Created: Playlist.kt")
        
