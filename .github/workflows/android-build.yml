    - name: Create layout files
      run: |
        echo "📄 Creating required layout files..."
        mkdir -p app/src/main/res/layout
        
        # dialog_ab_repeat.xml
        cat > app/src/main/res/layout/dialog_ab_repeat.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:orientation="vertical"
            android:padding="24dp">
            
            <TextView
                android:id="@+id/tvAbRepeatTitle"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="A-B Repeat"
                android:textSize="20sp"
                android:textStyle="bold"
                android:paddingBottom="16dp"/>
            
            <TextView
                android:id="@+id/tvAbRepeatStatus"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="No repeat set"
                android:textAlignment="center"
                android:paddingTop="8dp"
                android:paddingBottom="16dp"/>
            
            <LinearLayout
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:orientation="horizontal"
                android:gravity="center">
                
                <Button
                    android:id="@+id/btnSetPointA"
                    android:layout_width="0dp"
                    android:layout_height="wrap_content"
                    android:layout_weight="1"
                    android:text="Set Point A"
                    android:layout_marginEnd="8dp"/>
                
                <Button
                    android:id="@+id/btnSetPointB"
                    android:layout_width="0dp"
                    android:layout_height="wrap_content"
                    android:layout_weight="1"
                    android:text="Set Point B"
                    android:layout_marginStart="8dp"/>
            </LinearLayout>
            
            <Button
                android:id="@+id/btnClearAbRepeat"
                android:layout_width="match_parent"
                android:layout_height="wrap_content"
                android:text="Clear Repeat"
                android:layout_marginTop="16dp"/>
        </LinearLayout>
        EOF
        
        echo "✅ Layout files created!"
        ls -lh app/src/main/res/layout/

    - name: Clean project
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: JPlayer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Summary
      run: |
        echo "✅ Build completed successfully!"
        echo "📦 APK Info:"
        ls -lh app/build/outputs/apk/debug/*.apk
        echo ""
        echo "📥 Download the APK from the Artifacts section above"