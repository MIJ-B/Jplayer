name: Android CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Fix root build.gradle.kts
      run: |
        echo "🔧 Creating proper root build.gradle.kts..."
        cat > build.gradle.kts << 'EOF'
        // Top-level build file where you can add configuration options common to all sub-projects/modules.
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        
        tasks.register("clean", Delete::class) {
            delete(rootProject.buildDir)
        }
        EOF
        
        echo "✅ Root build.gradle.kts created!"

    - name: Fix settings.gradle.kts
      run: |
        echo "🔧 Creating proper settings.gradle.kts..."
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "JPlayer"
        include(":app")
        EOF
        
        echo "✅ settings.gradle.kts created!"

    - name: Fix app/build.gradle.kts
      run: |
        echo "🔧 Creating proper app/build.gradle.kts..."
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
            id("kotlin-parcelize")
        }

        android {
            namespace = "com.example.jplayer"
            compileSdk = 34

            defaultConfig {
                applicationId = "com.example.jplayer"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0.0"

                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
                vectorDrawables {
                    useSupportLibrary = true
                }
            }

            buildTypes {
                release {
                    isMinifyEnabled = false
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }

            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = "17"
            }

            buildFeatures {
                viewBinding = true
            }
        }

        dependencies {
            // Core Android
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.constraintlayout:constraintlayout:2.1.4")

            // Media3 ExoPlayer
            implementation("androidx.media3:media3-exoplayer:1.2.1")
            implementation("androidx.media3:media3-ui:1.2.1")
            implementation("androidx.media3:media3-common:1.2.1")
            implementation("androidx.media3:media3-session:1.2.1")
            implementation("androidx.media:media:1.7.0")

            // Lifecycle & ViewModel
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-livedata-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-service:2.7.0")

            // Navigation
            implementation("androidx.navigation:navigation-fragment-ktx:2.7.6")
            implementation("androidx.navigation:navigation-ui-ktx:2.7.6")

            // RecyclerView & CardView
            implementation("androidx.recyclerview:recyclerview:1.3.2")
            implementation("androidx.cardview:cardview:1.0.0")

            // SwipeRefreshLayout
            implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")

            // ViewPager2
            implementation("androidx.viewpager2:viewpager2:1.0.0")

            // Coroutines
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")

            // Room Database
            implementation("androidx.room:room-runtime:2.6.1")
            implementation("androidx.room:room-ktx:2.6.1")

            // Glide
            implementation("com.github.bumptech.glide:glide:4.16.0")

            // Preferences
            implementation("androidx.preference:preference-ktx:1.2.1")

            // Testing
            testImplementation("junit:junit:4.13.2")
            androidTestImplementation("androidx.test.ext:junit:1.1.5")
            androidTestImplementation("androidx.test.espresso:espresso-core:3.5.1")
        }
        EOF
        
        echo "✅ app/build.gradle.kts created!"

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

   

    - name: Clean project
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: JPlayer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Summary
      run: |
        echo "✅ Build completed successfully!"
        echo "📦 APK Info:"
        ls -lh app/build/outputs/apk/debug/*.apk
        echo ""
        echo "📥 Download the APK from the Artifacts section above"