name: Android CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Fix root build.gradle.kts
      run: |
        echo "🔧 Creating proper root build.gradle.kts..."
        cat > build.gradle.kts << 'EOF'
        // Top-level build file where you can add configuration options common to all sub-projects/modules.
        plugins {
            id("com.android.application") version "8.2.0" apply false
            id("org.jetbrains.kotlin.android") version "1.9.20" apply false
        }
        
        tasks.register("clean", Delete::class) {
            delete(rootProject.buildDir)
        }
        EOF
        
        echo "✅ Root build.gradle.kts created!"

    - name: Fix settings.gradle.kts
      run: |
        echo "🔧 Creating proper settings.gradle.kts..."
        cat > settings.gradle.kts << 'EOF'
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        
        rootProject.name = "JPlayer"
        include(":app")
        EOF
        
        echo "✅ settings.gradle.kts created!"

    - name: Fix app/build.gradle.kts
      run: |
        echo "🔧 Creating proper app/build.gradle.kts..."
        cat > app/build.gradle.kts << 'EOF'
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
            id("kotlin-parcelize")
        }

        android {
            namespace = "com.example.jplayer"
            compileSdk = 34

            defaultConfig {
                applicationId = "com.example.jplayer"
                minSdk = 24
                targetSdk = 34
                versionCode = 1
                versionName = "1.0.0"

                testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"
                vectorDrawables {
                    useSupportLibrary = true
                }
            }

            buildTypes {
                release {
                    isMinifyEnabled = false
                    proguardFiles(
                        getDefaultProguardFile("proguard-android-optimize.txt"),
                        "proguard-rules.pro"
                    )
                }
            }

            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_17
                targetCompatibility = JavaVersion.VERSION_17
            }

            kotlinOptions {
                jvmTarget = "17"
            }

            buildFeatures {
                viewBinding = true
            }
        }

        dependencies {
            // Core Android
            implementation("androidx.core:core-ktx:1.12.0")
            implementation("androidx.appcompat:appcompat:1.6.1")
            implementation("com.google.android.material:material:1.11.0")
            implementation("androidx.constraintlayout:constraintlayout:2.1.4")

            // Media3 ExoPlayer
            implementation("androidx.media3:media3-exoplayer:1.2.1")
            implementation("androidx.media3:media3-ui:1.2.1")
            implementation("androidx.media3:media3-common:1.2.1")
            implementation("androidx.media3:media3-session:1.2.1")
            implementation("androidx.media:media:1.7.0")

            // Lifecycle & ViewModel
            implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-viewmodel-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-livedata-ktx:2.7.0")
            implementation("androidx.lifecycle:lifecycle-service:2.7.0")

            // Navigation
            implementation("androidx.navigation:navigation-fragment-ktx:2.7.6")
            implementation("androidx.navigation:navigation-ui-ktx:2.7.6")

            // RecyclerView & CardView
            implementation("androidx.recyclerview:recyclerview:1.3.2")
            implementation("androidx.cardview:cardview:1.0.0")

            // SwipeRefreshLayout
            implementation("androidx.swiperefreshlayout:swiperefreshlayout:1.1.0")

            // ViewPager2
            implementation("androidx.viewpager2:viewpager2:1.0.0")

            // Coroutines
            implementation("org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3")

            // Room Database
            implementation("androidx.room:room-runtime:2.6.1")
            implementation("androidx.room:room-ktx:2.6.1")

            // Glide
            implementation("com.github.bumptech.glide:glide:4.16.0")

            // Preferences
            implementation("androidx.preference:preference-ktx:1.2.1")

            // Testing
            testImplementation("junit:junit:4.13.2")
            androidTestImplementation("androidx.test.ext:junit:1.1.5")
            androidTestImplementation("androidx.test.espresso:espresso-core:3.5.1")
        }
        EOF
        
        echo "✅ app/build.gradle.kts created!"

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    - name: Create launcher icons
      run: |
        echo "🎨 Generating IPlayer launcher icons..."
        
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Generate ic_launcher.png for all densities
        convert -size 48x48 xc:"#6200EE" -fill white -stroke white -strokewidth 2 -draw "polygon 18,12 18,36 36,24" app/src/main/res/mipmap-mdpi/ic_launcher.png
        convert -size 72x72 xc:"#6200EE" -fill white -stroke white -strokewidth 2 -draw "polygon 27,18 27,54 54,36" app/src/main/res/mipmap-hdpi/ic_launcher.png
        convert -size 96x96 xc:"#6200EE" -fill white -stroke white -strokewidth 3 -draw "polygon 36,24 36,72 72,48" app/src/main/res/mipmap-xhdpi/ic_launcher.png
        convert -size 144x144 xc:"#6200EE" -fill white -stroke white -strokewidth 4 -draw "polygon 54,36 54,108 108,72" app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        convert -size 192x192 xc:"#6200EE" -fill white -stroke white -strokewidth 5 -draw "polygon 72,48 72,144 144,96" app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
        # Generate ic_launcher_round.png for all densities
        convert -size 48x48 xc:none -fill "#3700B3" -draw "circle 24,24 24,0" -fill white -stroke white -strokewidth 2 -draw "polygon 18,12 18,36 36,24" app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        convert -size 72x72 xc:none -fill "#3700B3" -draw "circle 36,36 36,0" -fill white -stroke white -strokewidth 2 -draw "polygon 27,18 27,54 54,36" app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        convert -size 96x96 xc:none -fill "#3700B3" -draw "circle 48,48 48,0" -fill white -stroke white -strokewidth 3 -draw "polygon 36,24 36,72 72,48" app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        convert -size 144x144 xc:none -fill "#3700B3" -draw "circle 72,72 72,0" -fill white -stroke white -strokewidth 4 -draw "polygon 54,36 54,108 108,72" app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        convert -size 192x192 xc:none -fill "#3700B3" -draw "circle 96,96 96,0" -fill white -stroke white -strokewidth 5 -draw "polygon 72,48 72,144 144,96" app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        
        echo "✅ Launcher icons generated!"
        ls -lh app/src/main/res/mipmap-*/

    - name: Generate drawable resources
      run: |
        echo "🎨 Creating ALL required drawable resources..."
