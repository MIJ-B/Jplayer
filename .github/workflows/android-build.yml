name: Android CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle 8.2
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Install ImageMagick
      run: sudo apt-get update && sudo apt-get install -y imagemagick

    - name: Create launcher icons
      run: |
        echo "🎨 Generating launcher icons..."
        
        # Create mipmap directories
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
        # Generate ic_launcher.png (purple square with white play icon)
        convert -size 48x48 xc:"#6200EE" \
          -fill white -stroke white -strokewidth 2 \
          -draw "polygon 18,12 18,36 36,24" \
          app/src/main/res/mipmap-mdpi/ic_launcher.png
        
        convert -size 72x72 xc:"#6200EE" \
          -fill white -stroke white -strokewidth 2 \
          -draw "polygon 27,18 27,54 54,36" \
          app/src/main/res/mipmap-hdpi/ic_launcher.png
        
        convert -size 96x96 xc:"#6200EE" \
          -fill white -stroke white -strokewidth 3 \
          -draw "polygon 36,24 36,72 72,48" \
          app/src/main/res/mipmap-xhdpi/ic_launcher.png
        
        convert -size 144x144 xc:"#6200EE" \
          -fill white -stroke white -strokewidth 4 \
          -draw "polygon 54,36 54,108 108,72" \
          app/src/main/res/mipmap-xxhdpi/ic_launcher.png
        
        convert -size 192x192 xc:"#6200EE" \
          -fill white -stroke white -strokewidth 5 \
          -draw "polygon 72,48 72,144 144,96" \
          app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
        
        # Generate ic_launcher_round.png (dark purple circle with white play icon)
        convert -size 48x48 xc:none \
          -fill "#3700B3" -draw "circle 24,24 24,0" \
          -fill white -stroke white -strokewidth 2 \
          -draw "polygon 18,12 18,36 36,24" \
          app/src/main/res/mipmap-mdpi/ic_launcher_round.png
        
        convert -size 72x72 xc:none \
          -fill "#3700B3" -draw "circle 36,36 36,0" \
          -fill white -stroke white -strokewidth 2 \
          -draw "polygon 27,18 27,54 54,36" \
          app/src/main/res/mipmap-hdpi/ic_launcher_round.png
        
        convert -size 96x96 xc:none \
          -fill "#3700B3" -draw "circle 48,48 48,0" \
          -fill white -stroke white -strokewidth 3 \
          -draw "polygon 36,24 36,72 72,48" \
          app/src/main/res/mipmap-xhdpi/ic_launcher_round.png
        
        convert -size 144x144 xc:none \
          -fill "#3700B3" -draw "circle 72,72 72,0" \
          -fill white -stroke white -strokewidth 4 \
          -draw "polygon 54,36 54,108 108,72" \
          app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png
        
        convert -size 192x192 xc:none \
          -fill "#3700B3" -draw "circle 96,96 96,0" \
          -fill white -stroke white -strokewidth 5 \
          -draw "polygon 72,48 72,144 144,96" \
          app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
        
        echo "✅ Launcher icons generated!"
        ls -lh app/src/main/res/mipmap-*/

    - name: Clean project
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: IPlayer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Summary
      run: |
        echo "✅ Build completed successfully!"
        echo "📦 APK Info:"
        ls -lh app/build/outputs/apk/debug/*.apk
        echo ""
        echo "📥 Download the APK from the Artifacts section above"