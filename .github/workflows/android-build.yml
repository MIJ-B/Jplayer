name: Android CI - JPlayer

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Generate launcher icons
      run: |
        echo "Generating launcher icons..."
        mkdir -p app/src/main/res/mipmap-mdpi
        mkdir -p app/src/main/res/mipmap-hdpi
        mkdir -p app/src/main/res/mipmap-xhdpi
        mkdir -p app/src/main/res/mipmap-xxhdpi
        mkdir -p app/src/main/res/mipmap-xxxhdpi
        
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Build Release APK
      run: ./gradlew assembleRelease --stacktrace
      continue-on-error: true
      
    - name: Run Unit Tests
      run: ./gradlew test --stacktrace
      continue-on-error: true
      
    - name: Run Lint
      run: ./gradlew lint --stacktrace
      continue-on-error: true
      
    - name: Get version name
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"
        
    - name: Rename APK
      run: |
        cd app/build/outputs/apk/debug
        mv app-debug.apk JPlayer-v${{ steps.version.outputs.version }}-debug.apk
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: JPlayer-Debug-APK
        path: app/build/outputs/apk/debug/JPlayer-v${{ steps.version.outputs.version }}-debug.apk
        retention-days: 30
        
    - name: Upload Release APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: JPlayer-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
      continue-on-error: true
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: app/build/test-results/
        retention-days: 7
      continue-on-error: true
        
    - name: Upload Lint Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: app/build/reports/lint-results*.html
        retention-days: 7
      continue-on-error: true
        
    - name: Build Summary
      if: always()
      run: |
        echo "## 🎬 JPlayer Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Information" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Time**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "✅ Debug APK generated successfully" >> $GITHUB_STEP_SUMMARY
        
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        name: JPlayer-Debug-APK
        path: ./artifacts
        
    - name: Get version and date
      id: release_info
      run: |
        VERSION=$(grep "versionName" app/build.gradle | awk '{print $2}' | tr -d '"')
        DATE=$(date +"%Y-%m-%d")
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$DATE" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION-$DATE" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release_info.outputs.tag }}
        name: JPlayer v${{ steps.release_info.outputs.version }} - ${{ steps.release_info.outputs.date }}
        body: |
          ## 🎬 JPlayer v${{ steps.release_info.outputs.version }}
          
          ### What's New
          - Latest build from main branch
          - Build date: ${{ steps.release_info.outputs.date }}
          - Commit: ${{ github.sha }}
          
          ### Features
          - 📹 Advanced video player with gesture controls
          - 🎵 Audio player with background playback
          - 🎮 A-B repeat, playback speed control
          - 🔒 Screen lock and orientation controls
          - 📊 Smart sorting and playlists
          
          ### Download
          Download the APK below and install on your Android device (API 24+)
          
          ### Installation
          1. Download JPlayer-v${{ steps.release_info.outputs.version }}-debug.apk
          2. Enable "Install from Unknown Sources" in your device settings
          3. Install the APK
          4. Grant necessary permissions (Storage, etc.)
          
          ---
          Made with ❤️ in Madagascar
        files: |
          ./artifacts/JPlayer-v${{ steps.release_info.outputs.version }}-debug.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}