name: Android CI Build

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2
      with:
        gradle-version: 8.2

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.2

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Verify project structure
      run: |
        echo "📁 Project structure:"
        ls -la
        echo ""
        echo "📁 App directory:"
        ls -la app/
        echo ""
        echo "🎨 Checking icons:"
        ls -la app/src/main/res/mipmap-*/ || echo "⚠️ No mipmap directories found"

    - name: Clean project
      run: ./gradlew clean

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: IPlayer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Build Summary
      run: |
        echo "✅ Build completed successfully!"
        echo ""
        echo "📦 APK Info:"
        ls -lh app/build/outputs/apk/debug/*.apk
        echo ""
        APK_SIZE=$(ls -lh app/build/outputs/apk/debug/app-debug.apk | awk '{print $5}')
        echo "📏 APK Size: $APK_SIZE"
        echo ""
        echo "📥 Download the APK from the Artifacts section above"