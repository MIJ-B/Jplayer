name: Android CI - JPlayer

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        gradle-version: 8.4
        
    - name: Generate Gradle Wrapper
      run: |
        echo "🔧 Generating Gradle Wrapper..."
        gradle wrapper --gradle-version 8.4 --distribution-type all
        chmod +x gradlew
        echo "✅ Gradle Wrapper generated successfully"
        
    - name: Verify Gradle Wrapper
      run: |
        echo "📋 Verifying Gradle setup..."
        ./gradlew --version
        
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Clean project
      run: ./gradlew clean --stacktrace
        
    - name: Build Debug APK
      run: |
        echo "🔨 Building Debug APK..."
        ./gradlew assembleDebug --stacktrace --info
        echo "✅ Debug APK built successfully"
      
    - name: Build Release APK (unsigned)
      run: |
        echo "🔨 Building Release APK..."
        ./gradlew assembleRelease --stacktrace
        echo "✅ Release APK built successfully"
      continue-on-error: true
      
    - name: Run Unit Tests
      run: |
        echo "🧪 Running unit tests..."
        ./gradlew test --stacktrace
      continue-on-error: true
      
    - name: Run Lint Checks
      run: |
        echo "🔍 Running lint checks..."
        ./gradlew lint --stacktrace
      continue-on-error: true
      
    - name: Get version info
      id: version
      run: |
        # Extract version from build.gradle or build.gradle.kts
        if [ -f "app/build.gradle.kts" ]; then
          VERSION=$(grep -E 'versionName.*=.*".*"' app/build.gradle.kts | sed -E 's/.*"(.*)".*/\1/' | head -1)
        elif [ -f "app/build.gradle" ]; then
          VERSION=$(grep 'versionName' app/build.gradle | awk '{print $2}' | tr -d '"' | tr -d "'" | head -1)
        else
          VERSION="1.0.0"
        fi
        
        if [ -z "$VERSION" ]; then
          VERSION="1.0.0"
        fi
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📱 Version detected: $VERSION"
        
    - name: Find and prepare APKs
      id: find_apk
      run: |
        echo "📦 Locating APK files..."
        
        # Find debug APK
        DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" -type f | head -1)
        
        if [ -n "$DEBUG_APK" ]; then
          DIR=$(dirname "$DEBUG_APK")
          NEW_NAME="JPlayer-v${{ steps.version.outputs.version }}-debug.apk"
          mv "$DEBUG_APK" "$DIR/$NEW_NAME"
          echo "debug_apk=$DIR/$NEW_NAME" >> $GITHUB_OUTPUT
          echo "✅ Debug APK: $NEW_NAME"
          
          # Get APK size
          SIZE=$(du -h "$DIR/$NEW_NAME" | cut -f1)
          echo "apk_size=$SIZE" >> $GITHUB_OUTPUT
        else
          echo "❌ Debug APK not found"
          exit 1
        fi
        
        # Find release APK (optional)
        RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$RELEASE_APK" ]; then
          echo "release_found=true" >> $GITHUB_OUTPUT
          echo "✅ Release APK found"
        else
          echo "release_found=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: JPlayer-v${{ steps.version.outputs.version }}-debug
        path: ${{ steps.find_apk.outputs.debug_apk }}
        retention-days: 30
        if-no-files-found: error
        
    - name: Upload Release APK
      if: steps.find_apk.outputs.release_found == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: JPlayer-v${{ steps.version.outputs.version }}-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
      continue-on-error: true
        
    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          app/build/test-results/**/*.xml
          app/build/reports/tests/**/*
        retention-days: 7
        if-no-files-found: ignore
      continue-on-error: true
        
    - name: Upload Lint Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-results
        path: |
          app/build/reports/lint-*.html
          app/build/reports/lint-*.xml
        retention-days: 7
        if-no-files-found: ignore
      continue-on-error: true
        
    - name: Build Summary
      if: always()
      run: |
        echo "## 🎬 JPlayer Build Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📱 Build Information" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Version** | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
        echo "| **Build Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📦 Artifacts" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "${{ steps.find_apk.outputs.debug_apk }}" ]; then
          echo "- ✅ **Debug APK**: JPlayer-v${{ steps.version.outputs.version }}-debug.apk" >> $GITHUB_STEP_SUMMARY
          echo "- 💾 **Size**: ${{ steps.find_apk.outputs.apk_size }}" >> $GITHUB_STEP_SUMMARY
        else
          echo "- ❌ Debug APK generation failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [ "${{ steps.find_apk.outputs.release_found }}" == "true" ]; then
          echo "- ✅ **Release APK**: Available" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📥 Download" >> $GITHUB_STEP_SUMMARY
        echo "Go to the **Actions** tab above and download the artifacts." >> $GITHUB_STEP_SUMMARY
        
  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download Debug APK
      uses: actions/download-artifact@v4
      with:
        pattern: JPlayer-v*-debug
        path: ./artifacts
        merge-multiple: true
        
    - name: Get version and date
      id: release_info
      run: |
        if [ -f "app/build.gradle.kts" ]; then
          VERSION=$(grep -E 'versionName.*=.*".*"' app/build.gradle.kts | sed -E 's/.*"(.*)".*/\1/' | head -1)
        elif [ -f "app/build.gradle" ]; then
          VERSION=$(grep 'versionName' app/build.gradle | awk '{print $2}' | tr -d '"' | tr -d "'" | head -1)
        else
          VERSION="1.0.0"
        fi
        
        if [ -z "$VERSION" ]; then
          VERSION="1.0.0"
        fi
        
        DATE=$(date +"%Y-%m-%d")
        TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "date=$DATE" >> $GITHUB_OUTPUT
        echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
        echo "tag=v$VERSION-$TIMESTAMP" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.release_info.outputs.tag }}
        name: JPlayer v${{ steps.release_info.outputs.version }} - ${{ steps.release_info.outputs.date }}
        body: |
          ## 🎬 JPlayer v${{ steps.release_info.outputs.version }}
          
          **Automated release from main branch**
          
          ### 📅 Release Information
          - **Version**: ${{ steps.release_info.outputs.version }}
          - **Build Date**: ${{ steps.release_info.outputs.date }}
          - **Commit**: [${{ github.sha }}](${{ github.event.repository.html_url }}/commit/${{ github.sha }})
          - **Branch**: ${{ github.ref_name }}
          
          ### ✨ Features
          - 📹 **Video Player**: Advanced playback with gesture controls
          - 🎵 **Audio Player**: Background playback with notification controls
          - 🎮 **Controls**: A-B repeat, variable playback speed (0.25x - 2.0x)
          - 🔒 **Screen Controls**: Lock/unlock orientation, rotation support
          - 📊 **Organization**: Smart sorting, playlists, favorites
          - 🔍 **Search**: Quick media search functionality
          - 🎨 **UI**: Material Design 3 with modern interface
          
          ### 📥 Installation
          1. Download `JPlayer-v${{ steps.release_info.outputs.version }}-debug.apk` below
          2. Enable "Install from Unknown Sources" in your device settings
          3. Install the APK file
          4. Grant necessary permissions (Storage, Media, etc.)
          
          ### 📱 Requirements
          - Android 7.0 (API 24) or higher
          - ~20MB storage space
          - Permissions: Storage, Media access
          
          ### 🔧 Tech Stack
          - Kotlin 100%
          - Media3 ExoPlayer
          - Material Design 3
          - MVVM Architecture
          
          ---
          
          Made with ❤️ in Madagascar
          
          > **Note**: This is a debug build for testing purposes. For production use, consider using a signed release build.
        files: |
          ./artifacts/*.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}